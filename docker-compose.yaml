services:
  db:
    image: docker.io/library/postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scout}
      POSTGRES_DB: ${POSTGRES_DB:-scout}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # HTTP port lives here — server shares this container's network (Podman DNS for "db" is unreliable).
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scout} -d ${POSTGRES_DB:-scout}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    network_mode: service:db
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: ${PORT:-8080}
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY:-}
      GEO_ENABLED: ${GEO_ENABLED:-true}

networks:
  default:
    name: scout-logger_default

volumes:
  pgdata:
