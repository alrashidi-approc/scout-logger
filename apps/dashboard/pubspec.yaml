name: scout_dashboard
description: Scout Logger — Flutter Web dashboard
publish_to: none
version: 0.1.1+16

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  http: ^1.2.2
  go_router: ^14.6.2
  url_launcher: ^6.3.0
  intl: ^0.19.0
  web: ^1.1.0
  shared_preferences: ^2.3.3
  fl_chart: ^0.69.0
  countries_world_map: ^1.3.0
  pdf: ^3.11.0
  printing: ^5.13.0
  scout_models:
    path: ../../packages/scout_models

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - web/bootstrap.json
